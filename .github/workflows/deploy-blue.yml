# BLUE SLOT — Production Deployment
# Triggered when code is merged to the 'main' branch.
# This is your LIVE production environment.

name: Blue (Production) Deploy

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_blue:
    name: Build and Deploy to Blue (Production)
    runs-on: ubuntu-latest
    environment:
      name: blue-production
      url: ${{ steps.deploy.outputs.static_web_app_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Traffic Management Dashboard UI/package.json'

      - name: Install dependencies
        working-directory: 'Traffic Management Dashboard UI'
        run: npm ci

      - name: Build for production
        working-directory: 'Traffic Management Dashboard UI'
        run: npm run build
        env:
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy to Azure Static Web Apps (Blue - Production)
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BLUE }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'Traffic Management Dashboard UI'
          output_location: dist
          skip_app_build: true

      - name: Notify Blue deployment success
        run: |
          echo "Blue (Production) deployment complete."
          echo "URL: ${{ steps.deploy.outputs.static_web_app_url }}"

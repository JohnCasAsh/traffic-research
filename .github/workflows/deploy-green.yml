# GREEN SLOT — Staging/Testing Deployment
# Triggered when code is pushed to the 'develop' branch.
# This is your TESTING environment before promoting to production (Blue).
# After testing, merge develop -> main to promote Green to Blue.

name: Green (Staging) Deploy

on:
  push:
    branches:
      - develop

jobs:
  build_and_deploy_green:
    name: Build and Deploy to Green (Staging)
    runs-on: ubuntu-latest
    environment:
      name: green-staging
      url: ${{ steps.deploy.outputs.static_web_app_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'Traffic Management Dashboard UI/package.json'

      - name: Install dependencies
        working-directory: 'Traffic Management Dashboard UI'
        run: npm ci

      - name: Build for staging
        working-directory: 'Traffic Management Dashboard UI'
        run: npm run build
        env:
          VITE_APP_ENV: staging
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Deploy to Azure Static Web Apps (Green - Staging)
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: 'Traffic Management Dashboard UI/dist'
          skip_app_build: true
          deployment_environment: staging

      - name: Notify Green deployment success
        run: |
          echo "Green (Staging) deployment complete."
          echo "Staging URL: ${{ steps.deploy.outputs.static_web_app_url }}"
          echo "Review and test, then merge develop -> main to promote to Blue production."

      - name: Notify Make.com after deploy
        if: success()
        env:
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          if [ -z "$MAKE_WEBHOOK_URL" ]; then
            echo "MAKE_WEBHOOK_URL secret not configured; skipping Make notification."
            exit 0
          fi

          timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          payload=$(cat <<EOF
          {
            "eventType": "github_deploy_completed",
            "service": "traffic-management-frontend",
            "environment": "green-staging",
            "timestamp": "$timestamp",
            "payload": {
              "severity": "info",
              "message": "GitHub Actions deploy completed for develop",
              "commit": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "runId": "${{ github.run_id }}",
              "runNumber": "${{ github.run_number }}",
              "actor": "${{ github.actor }}",
              "repo": "${{ github.repository }}",
              "stagingUrl": "${{ steps.deploy.outputs.static_web_app_url }}"
            }
          }
          EOF
          )

          curl -sS -X POST "$MAKE_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload" >/dev/null
          echo "Make.com notification sent."

  # Optional: Close staging environment when PR is closed
  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Green Staging Environment
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GREEN }}
          action: close
          app_location: 'Traffic Management Dashboard UI'
